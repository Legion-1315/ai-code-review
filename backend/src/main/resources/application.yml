spring:
  application:
    name: ai-code-review

  # Default profile uses an in-memory H2 database so the app runs with zero setup.
  datasource:
    url: jdbc:h2:mem:codereview;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: ${PORT:8080}
  error:
    include-message: always
  forward-headers-strategy: framework

# Application-specific configuration
app:
  jwt:
    # Override in production via APP_JWT_SECRET (must be at least 32 bytes / 256 bits).
    secret: ${APP_JWT_SECRET:change-me-in-production-this-is-a-dev-only-secret-key-0123456789}
    expiration-ms: 86400000  # 24 hours

  cors:
    allowed-origins: ${APP_CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

  github:
    # HMAC secret configured on the GitHub webhook. Leave blank to disable signature checks (dev only).
    webhook-secret: ${GITHUB_WEBHOOK_SECRET:}

ai:
  # The Claude model used for reviews.
  model: ${AI_MODEL:claude-opus-4-8}
  max-tokens: 8000
  # When no ANTHROPIC_API_KEY is present the engine runs in deterministic mock mode,
  # so the whole application is demoable without external credentials.
  api-key: ${ANTHROPIC_API_KEY:}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.codereview: INFO

---
# Production profile: PostgreSQL. Activate with SPRING_PROFILES_ACTIVE=postgres
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/codereview}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: false
